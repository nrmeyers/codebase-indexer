[project]
name = "code-indexer-service"
version = "0.1.0"
description = "FastAPI HTTP gateway exposing code-graph-rag indexing and search to TheForge"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.0",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.7.0",
    "python-dotenv>=1.2.2",
    "uvicorn[standard]>=0.45.0",
    "real-ladybug>=0.15.3",
    "code-graph-rag",
    # Semantic search stack — required for /search/semantic and /context-bundle
    # to return populated results.  UniXcoder runs on CPU via torch; transformers
    # ships the tokenizer + model loader.  ~500MB installed footprint, one-time.
    "torch>=2.6.0",
    "transformers>=4.0.0",
    "tree-sitter-javascript>=0.23.1",
    "tree-sitter-typescript>=0.23.2",
    "tree-sitter-c-sharp>=0.23.5",
    "tree-sitter-go>=0.23.4",
    "tree-sitter-java>=0.23.5",
    "tree-sitter-rust>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
code-graph-rag = { path = "/Users/zacharymatthews/code-graph-rag", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["app"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.11",
]
